{% extends "base.html" %}
{% load static %}

{% block title %}Message Sent - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-20 sm:py-28 lg:py-32 bg-base">
    <div class="container max-w-xl text-center">
        <div class="w-20 h-20 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400"><path d="M20 6 9 17l-5-5"/></svg>
        </div>

        <h1 class="text-3xl sm:text-4xl font-display font-bold text-white mb-4">Message Sent</h1>
        <p class="text-secondary text-lg mb-8">
            Thank you for reaching out. Your message has been received and we will respond as soon as possible.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'memorial:home' %}" class="btn-ember">
                Return Home
            </a>
            <a href="{% url 'memorial:contact' %}" class="btn-outline">
                Send Another Message
            </a>
        </div>
    </div>
</section>
{% endblock %}
